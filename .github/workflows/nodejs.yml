name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    name: Build, lint, and test on Node ${{ matrix.node }} and ${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    services:
      # Label used to access the service container
      redis:
        # Docker Hub image
        image: redis
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps port 6379 on service container to the host
          - 6379:6379

    strategy:
      matrix:
        node: [ '20.x', '22.x', '24.x' ]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'

      - name: Install deps
        run: yarn install --immutable
        env:
          CI: true

      - name: Lint
        run: yarn lint:check

      - name: Format check
        run: yarn format:check

      - name: Build
        run: yarn build
        env:
          CI: true

      - name: Test
        run: yarn test
        env:
          CI: true
          REDIS_HOST: localhost
          # The default Redis port
          REDIS_PORT: 6379

      - name: Coverage (@bull-board/api)
        if: matrix.node == '24.x'
        run: yarn workspace @bull-board/api test:coverage
        env:
          CI: true
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage to Codecov
        if: matrix.node == '24.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/api/coverage/lcov.info
          flags: api
          fail_ci_if_error: false # non-blocking until CODECOV_TOKEN is set

  test-bun:
    name: Test Bun adapter
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Use Node 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'yarn'

      - name: Use Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: yarn install --immutable
        env:
          CI: true

      - name: Build
        run: yarn build
        env:
          CI: true

      - name: Test Bun adapter
        run: yarn workspace @bull-board/bun test

  test-ui:
    name: Test UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Use Node 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'yarn'

      - name: Install deps
        run: yarn install --immutable
        env:
          CI: true

      - name: Build
        run: yarn build
        env:
          CI: true

      - name: Test UI
        run: yarn workspace @bull-board/ui test
        env:
          CI: true
