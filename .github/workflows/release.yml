name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    permissions:
      contents: write
      id-token: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --immutable
        env:
          CI: true

      - name: Build
        run: yarn build
        env:
          CI: true

      - name: Test
        run: yarn test
        env:
          CI: true
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generate release notes
        id: release-notes
        run: |
          body=$(npx changelogithub --dry 2>&1)
          prs=$(echo "$body" | grep -oP 'in #\K\d+' | sort -un | tr '\n' ' ')
          echo "prs=$prs" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          for pkg in packages/*/; do
            echo "Publishing $pkg..."
            cd "$pkg"
            npm publish --provenance --access public
            cd ../..
          done

      - name: Comment on released PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pr in ${{ steps.release-notes.outputs.prs }}; do
            existing=$(gh issue view "$pr" --json comments --jq \
              '.comments[].body | select(startswith("Released in"))' 2>/dev/null)
            if [ -z "$existing" ]; then
              gh issue comment "$pr" --body "Released in `${{ github.ref_name }}` 🚀"
            fi
          done
